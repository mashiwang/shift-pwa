<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>排班小助手 - HyperOS</title>

<!-- ✅ PWA 核心配置 -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- ✅ 修复：使用标准 <link> 引入字体，彻底解决 @import 导致代码外泄的问题 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    background: #f0f2f5; padding: 20px;
    overflow: hidden;
  }
  .phone-frame {
    width: 390px; height: 844px; background: #000; border-radius: 50px; padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 2px #333; position: relative;
    max-width: 100%; max-height: 100vh;
  }
  .screen {
    width: 100%; height: 100%; background: linear-gradient(165deg, #e8eaf6 0%, #f5f5f5 30%, #e3f2fd 60%, #e8f5e9 100%);
    border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 8px;
    font-size: 14px; font-weight: 600; color: #1a1a2e;
  }
  .status-bar .time { font-size: 15px; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }
  .dynamic-island {
    width: 120px; height: 32px; background: #000; border-radius: 20px; margin: 0 auto;
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
  }
  .content { flex: 1; overflow-y: auto; padding: 8px 20px 20px; -webkit-overflow-scrolling: touch; }
  .content::-webkit-scrollbar { display: none; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 10px; }
  .header h1 { font-size: 26px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 10px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 14px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
    border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; color: #1a1a2e;
  }
  .icon-btn:hover { background: rgba(255,255,255,1); transform: scale(1.05); }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn svg { width: 20px; height: 20px; }
  .current-shift-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 24px; padding: 22px; color: white;
    margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(102, 126, 234, 0.35);
  }
  .current-shift-card::before {
    content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px;
    background: rgba(255,255,255,0.1); border-radius: 50%;
  }
  .current-shift-card::after {
    content: ''; position: absolute; bottom: -20px; left: -20px; width: 80px; height: 80px;
    background: rgba(255,255,255,0.08); border-radius: 50%;
  }
  .shift-label { font-size: 13px; opacity: 0.85; font-weight: 400; margin-bottom: 4px; }
  .shift-name { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
  .shift-time { display: flex; align-items: center; gap: 8px; font-size: 15px; opacity: 0.9; font-weight: 400; }
  .shift-time svg { width: 16px; height: 16px; }
  .shift-progress { margin-top: 16px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden; }
  .shift-progress-bar { height: 100%; background: rgba(255,255,255,0.9); border-radius: 4px; transition: width 0.5s ease; }
  .shift-remaining { margin-top: 8px; font-size: 12px; opacity: 0.75; text-align: right; }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .week-nav h3 { font-size: 16px; font-weight: 600; color: #1a1a2e; }
  .week-arrows { display: flex; gap: 6px; }
  .arrow-btn {
    width: 32px; height: 32px; border-radius: 10px; background: rgba(255,255,255,0.7); border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; color: #1a1a2e;
  }
  .arrow-btn:hover { background: rgba(255,255,255,1); }
  .arrow-btn:active { transform: scale(0.9); }
  .arrow-btn svg { width: 16px; height: 16px; }
  .week-calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
  .day-item { display: flex; flex-direction: column; align-items: center; padding: 8px 2px; border-radius: 16px; cursor: pointer; transition: all 0.2s ease; position: relative; }
  .day-item:hover { background: rgba(255,255,255,0.6); }
  .day-item:active { transform: scale(0.95); }
  .day-item .day-name { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 500; }
  .day-item .day-num {
    font-size: 16px; font-weight: 600; color: #1a1a2e; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s ease;
  }
  .day-item.today .day-num {
    background: linear-gradient(135deg, #667eea, #764ba2); color: white;
    box-shadow: 0 3px 12px rgba(102, 126, 234, 0.4);
  }
  .day-item.selected .day-num { background: #1a1a2e; color: white; }
  .day-item .shift-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; }
  .shift-dot.early { background: #4CAF50; }
  .shift-dot.middle { background: #FF9800; }
  .shift-dot.late { background: #2196F3; }
  .shift-dot.off { background: #ccc; }
  .schedule-section h3 { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 12px; }
  .schedule-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .schedule-item {
    display: flex; align-items: center; background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 14px 16px; transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.5);
  }
  .schedule-item:hover { background: rgba(255,255,255,0.95); transform: translateX(4px); }
  .schedule-item:active { transform: scale(0.98); }
  .schedule-time-block { display: flex; flex-direction: column; align-items: center; margin-right: 14px; min-width: 44px; }
  .schedule-time-block .start-time { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .schedule-time-block .end-time { font-size: 11px; color: #999; margin-top: 2px; }
  .schedule-divider { width: 3px; height: 36px; border-radius: 3px; margin-right: 14px; }
  .schedule-divider.early { background: linear-gradient(180deg, #4CAF50, #81C784); }
  .schedule-divider.middle { background: linear-gradient(180deg, #FF9800, #FFB74D); }
  .schedule-divider.late { background: linear-gradient(180deg, #2196F3, #64B5F6); }
  .schedule-divider.off { background: linear-gradient(180deg, #ccc, #e0e0e0); }
  .schedule-info { flex: 1; }
  .schedule-info .title { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 3px; }
  .schedule-info .subtitle { font-size: 12px; color: #999; }
  .schedule-status { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
  .schedule-status.early { background: #E8F5E9; color: #2E7D32; }
  .schedule-status.middle { background: #FFF3E0; color: #E65100; }
  .schedule-status.late { background: #E3F2FD; color: #1565C0; }
  .schedule-status.off { background: #F5F5F5; color: #9E9E9E; }
  .stats-card {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(10px); border-radius: 20px;
    padding: 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.5);
  }
  .stats-card h3 { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 14px; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-item { background: rgba(255,255,255,0.6); border-radius: 14px; padding: 14px; text-align: center; }
  .stat-item .stat-num { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  .stat-item .stat-label { font-size: 12px; color: #999; margin-top: 2px; }
  .modal-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px); z-index: 100; display: none; align-items: flex-end; justify-content: center;
    border-radius: 40px; overflow: hidden;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    width: 100%; background: #f8f9fa; border-radius: 28px 28px 0 0; padding: 20px 24px 36px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 4px; margin: 0 auto 20px; }
  .modal-content h3 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 16px; border-radius: 14px; border: 1.5px solid #e0e0e0;
    font-size: 15px; font-family: inherit; background: white; color: #1a1a2e; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: #667eea; }
  .shift-type-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .shift-type-btn {
    padding: 10px 4px; border-radius: 12px; border: 2px solid #e0e0e0; background: white;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-align: center; font-family: inherit;
  }
  .shift-type-btn.active { border-color: #667eea; background: #f0f0ff; color: #667eea; }
  .shift-type-btn:hover { border-color: #667eea; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 14px; border: none; font-size: 15px;
    font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2); color: white;
    box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
  }
  .btn-secondary { background: #e8e8e8; color: #666; }
  .toast {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(26, 26, 46, 0.9); backdrop-filter: blur(10px); color: white; padding: 10px 20px;
    border-radius: 12px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s ease;
    z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .home-indicator { width: 134px; height: 5px; background: #1a1a2e; border-radius: 5px; margin: 0 auto 8px; opacity: 0.2; }
  @media (max-width: 420px) {
    .phone-frame { width: 100%; height: 100vh; border-radius: 0; padding: 0; box-shadow: none; }
    .screen { border-radius: 0; }
    .dynamic-island { display: none; }
    body { padding: 0; }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">
    <div class="dynamic-island"></div>
    <div class="toast" id="toast">✅ 已添加排班</div>

    <div class="status-bar">
      <span class="time" id="statusTime">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>

    <div class="content">
      <div class="header">
        <div><h1>📋 排班助手</h1></div>
        <div class="header-actions">
          <button class="icon-btn" onclick="openModal()" title="添加排班">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="icon-btn" onclick="autoGenerate()" title="智能排班">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </button>
        </div>
      </div>

      <div class="current-shift-card" id="currentShiftCard">
        <div class="shift-label">当前班次</div>
        <div class="shift-name" id="currentShiftName">早班</div>
        <div class="shift-time">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="currentShiftTime">08:00 - 16:00</span>
        </div>
        <div class="shift-progress">
          <div class="shift-progress-bar" id="shiftProgress" style="width: 0%"></div>
        </div>
        <div class="shift-remaining" id="shiftRemaining">已进行 0%</div>
      </div>

      <div class="week-nav">
        <h3 id="weekTitle">本周</h3>
        <div class="week-arrows">
          <button class="arrow-btn" onclick="changeWeek(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="arrow-btn" onclick="changeWeek(1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      <div class="week-calendar" id="weekCalendar"></div>

      <div class="schedule-section">
        <h3>📅 当日排班</h3>
        <div class="schedule-list" id="scheduleList"></div>
      </div>

      <div class="stats-card">
        <h3>📊 本月统计</h3>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-num" id="statEarly">0</div><div class="stat-label">早班</div></div>
          <div class="stat-item"><div class="stat-num" id="statMiddle">0</div><div class="stat-label">中班</div></div>
          <div class="stat-item"><div class="stat-num" id="statLate">0</div><div class="stat-label">晚班</div></div>
          <div class="stat-item"><div class="stat-num" id="statOff">0</div><div class="stat-label">休息</div></div>
        </div>
      </div>

      <div style="height: 20px;"></div>
      <div class="home-indicator"></div>
    </div>

    <div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
      <div class="modal-content">
        <div class="modal-handle"></div>
        <h3>✨ 添加排班</h3>
        <div class="form-group">
          <label>班次类型</label>
          <div class="shift-type-selector">
            <button class="shift-type-btn active" data-type="early" onclick="selectType(this)">🌅 早班</button>
            <button class="shift-type-btn" data-type="middle" onclick="selectType(this)">☀️ 中班</button>
            <button class="shift-type-btn" data-type="late" onclick="selectType(this)">🌙 晚班</button>
            <button class="shift-type-btn" data-type="off" onclick="selectType(this)">😴 休息</button>
          </div>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="shiftDate">
        </div>
        <div class="form-group" id="timeGroup">
          <label>时间段</label>
          <input type="text" id="shiftTimeRange" placeholder="如 08:00 - 16:00" value="08:00 - 16:00">
        </div>
        <div class="form-group">
          <label>备注</label>
          <input type="text" id="shiftNote" placeholder="可选填写备注...">
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="addShift()">添加排班</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentWeekOffset = 0;
  let selectedDate = new Date();
  let shifts = {};
  let selectedType = 'early';

  const shiftConfig = {
    early: { name: '早班', icon: '🌅', time: '08:00 - 16:00', startHour: 8, endHour: 16 },
    middle: { name: '中班', icon: '☀️', time: '14:00 - 22:00', startHour: 14, endHour: 22 },
    late: { name: '晚班', icon: '🌙', time: '22:00 - 06:00', startHour: 22, endHour: 30 },
    off: { name: '休息', icon: '😴', time: '全天休息', startHour: 0, endHour: 0 }
  };

  const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

  function init() {
    loadShifts();
    generateSampleShifts();
    renderWeek();
    renderSchedule();
    updateCurrentShift();
    updateStats();
    updateStatusTime();
    setInterval(updateCurrentShift, 60000);
    setInterval(updateStatusTime, 1000);
    document.getElementById('shiftDate').valueAsDate = new Date();
  }

  function loadShifts() {
    const saved = localStorage.getItem('hyperos_shifts');
    if (saved) shifts = JSON.parse(saved);
  }

  function saveShifts() {
    localStorage.setItem('hyperos_shifts', JSON.stringify(shifts));
  }

  function generateSampleShifts() {
    if (Object.keys(shifts).length > 0) return;
    const types = ['early', 'middle', 'late', 'off'];
    const today = new Date();
    for (let i = -7; i < 30; i++) {
      const d = new Date(today); d.setDate(d.getDate() + i);
      const key = formatDateKey(d);
      if (!shifts[key]) shifts[key] = types[Math.floor(Math.random() * 3)];
    }
    saveShifts();
  }

  function formatDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getWeekDates(offset) {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - dayOfWeek + 1 + offset * 7);
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function renderWeek() {
    const dates = getWeekDates(currentWeekOffset);
    const container = document.getElementById('weekCalendar');
    container.innerHTML = '';
    const startDate = dates[0], endDate = dates[6];
    document.getElementById('weekTitle').textContent = `${startDate.getMonth()+1}月${startDate.getDate()}日 - ${endDate.getMonth()+1}月${endDate.getDate()}日`;
    const todayKey = formatDateKey(new Date()), selectedKey = formatDateKey(selectedDate);

    dates.forEach(date => {
      const key = formatDateKey(date);
      const isToday = key === todayKey, isSelected = key === selectedKey, shift = shifts[key];
      const div = document.createElement('div');
      div.className = `day-item${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}`;
      div.onclick = () => selectDay(date);
      div.innerHTML = `
        <span class="day-name">周${dayNames[date.getDay()]}</span>
        <span class="day-num">${date.getDate()}</span>
        ${shift ? `<span class="shift-dot ${shift}"></span>` : ''}
      `;
      container.appendChild(div);
    });
  }

  function selectDay(date) { selectedDate = date; renderWeek(); renderSchedule(); }
  function changeWeek(dir) { currentWeekOffset += dir; renderWeek(); }

  function renderSchedule() {
    const key = formatDateKey(selectedDate), shift = shifts[key];
    const container = document.getElementById('scheduleList');
    if (!shift) {
      container.innerHTML = `<div style="text-align:center; padding:30px; color:#ccc;"><div style="font-size:40px; margin-bottom:10px;">📭</div><div style="font-size:14px;">暂无排班安排</div><div style="font-size:12px; margin-top:4px;">点击 + 添加或智能排班</div></div>`;
      return;
    }
    const config = shiftConfig[shift], now = new Date(), isToday = key === formatDateKey(now);
    let statusText = isToday ? '今日' : selectedDate > now ? '待执行' : '已完成';
    container.innerHTML = `
      <div class="schedule-item">
        <div class="schedule-time-block"><span class="start-time">${config.time.split(' - ')[0]}</span><span class="end-time">${config.time.split(' - ')[1] || ''}</span></div>
        <div class="schedule-divider ${shift}"></div>
        <div class="schedule-info"><div class="title">${config.icon} ${config.name}</div><div class="subtitle">${config.time}</div></div>
        <span class="schedule-status ${shift}">${statusText}</span>
      </div>`;
  }

  function updateCurrentShift() {
    const now = new Date(), key = formatDateKey(now), shift = shifts[key], card = document.getElementById('currentShiftCard');
    if (!shift) {
      document.getElementById('currentShiftName').textContent = '😴 休息中';
      document.getElementById('currentShiftTime').textContent = '今日无排班';
      document.getElementById('shiftProgress').style.width = '0%';
      document.getElementById('shiftRemaining').textContent = '';
      card.style.background = 'linear-gradient(135deg, #a8a8a8, #888)';
      return;
    }
    const config = shiftConfig[shift];
    document.getElementById('currentShiftName').textContent = config.name;
    document.getElementById('currentShiftTime').textContent = config.time;
    const gradients = { early: 'linear-gradient(135deg, #4CAF50, #2E7D32)', middle: 'linear-gradient(135deg, #FF9800, #E65100)', late: 'linear-gradient(135deg, #2196F3, #1565C0)', off: 'linear-gradient(135deg, #9E9E9E, #616161)' };
    card.style.background = gradients[shift];
    if (shift !== 'off') {
      const currentHour = now.getHours() + now.getMinutes() / 60;
      let startH = config.startHour, endH = config.endHour, progress = 0;
      if (endH > 24) {
        progress = currentHour >= startH ? (currentHour - startH)/(endH - startH) : currentHour < (endH - 24) ? (currentHour + 24 - startH)/(endH - startH) : 0;
      } else {
        progress = currentHour >= startH && currentHour <= endH ? (currentHour - startH)/(endH - startH) : currentHour > endH ? 1 : 0;
      }
      const pct = Math.min(100, Math.max(0, progress * 100));
      document.getElementById('shiftProgress').style.width = pct + '%';
      document.getElementById('shiftRemaining').textContent = `已进行 ${Math.round(pct)}%`;
    } else {
      document.getElementById('shiftProgress').style.width = '100%';
      document.getElementById('shiftRemaining').textContent = '好好休息 💤';
    }
  }

  function updateStats() {
    const now = new Date(), y = now.getFullYear(), m = now.getMonth();
    let counts = { early: 0, middle: 0, late: 0, off: 0 };
    for (let d = 1; d <= 31; d++) {
      const date = new Date(y, m, d); if (date.getMonth() !== m) break;
      const key = formatDateKey(date);
      if (shifts[key] && counts.hasOwnProperty(shifts[key])) counts[shifts[key]]++;
    }
    document.getElementById('statEarly').textContent = counts.early;
    document.getElementById('statMiddle').textContent = counts.middle;
    document.getElementById('statLate').textContent = counts.late;
    document.getElementById('statOff').textContent = counts.off;
  }

  function updateStatusTime() {
    const now = new Date();
    document.getElementById('statusTime').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }

  function openModal() { document.getElementById('modal').classList.add('active'); document.getElementById('shiftDate').valueAsDate = selectedDate; }
  function closeModal() { document.getElementById('modal').classList.remove('active'); }
  function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

  function selectType(btn) {
    document.querySelectorAll('.shift-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); selectedType = btn.dataset.type;
    document.getElementById('shiftTimeRange').value = shiftConfig[selectedType].time;
    document.getElementById('timeGroup').style.display = selectedType === 'off' ? 'none' : 'block';
  }

  function addShift() {
    const dateVal = document.getElementById('shiftDate').value;
    if (!dateVal) return;
    shifts[dateVal] = selectedType; saveShifts();
    selectedDate = new Date(dateVal + 'T00:00:00'); currentWeekOffset = 0;
    renderWeek(); renderSchedule(); updateCurrentShift(); updateStats();
    closeModal(); showToast('✅ 排班已添加');
  }

  function autoGenerate() {
    const types = ['early', 'middle', 'late', 'off'], today = new Date(); let count = 0;
    for (let i = 0; i < 30; i++) {
      const d = new Date(today); d.setDate(d.getDate() + i);
      const key = formatDateKey(d);
      if (!shifts[key]) { shifts[key] = i % 4 === 3 ? 'off' : types[i % 3]; count++; }
    }
    saveShifts(); renderWeek(); renderSchedule(); updateCurrentShift(); updateStats();
    showToast(`🤖 已智能生成 ${count} 天排班`);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  init();
</script>
